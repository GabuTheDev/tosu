name: Bug Report 2
description: placeholder
title: "bug: "
labels: ["unlabeled"]
body:
  - type: markdown
    attributes:
      value: |
        1. Describe your issue as detailed as possible
        2. Where does **tosu.exe** located (Folder path, Example: D:\tosu\tosu.exe)
        3. Record video showing:
           - tosu.env & config.ini
           - Enable debug in settings
           - Close tosu, then start it again
           - Open osu and show what not working
        4. Windows or Linux

  - type: checkboxes
    id: platform
    attributes:
      label: What platform are you using?
      options:
        - label: Windows
        - label: Linux
      # 'required' is not a valid attribute for checkboxes in GitHub Issue Forms
